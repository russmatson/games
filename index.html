<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Russ's Arcade</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:#0d0020;
      min-height:100vh;
      font-family:'Courier New',monospace;
      color:#fff;
      overflow-x:hidden;
    }
    header{
      text-align:center;
      padding:48px 20px 24px;
      background:linear-gradient(180deg,#1a0040 0%,#0d0020 100%);
      border-bottom:2px solid #ff00ff44;
    }
    header h1{
      font-size:2.6rem;
      color:#ff4dff;
      text-shadow:0 0 20px #ff00ff,0 0 40px #ff00ff44;
      letter-spacing:4px;
      margin-bottom:10px;
    }
    header p{
      color:#aaa;
      font-size:0.9rem;
      letter-spacing:2px;
    }
    .scanline{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
      pointer-events:none;z-index:999;
    }
    .games-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:24px;
      padding:40px;
      max-width:1200px;
      margin:0 auto;
    }
    .game-card{
      background:#1a0040;
      border:2px solid #7700cc;
      border-radius:12px;
      padding:28px 22px;
      text-decoration:none;
      color:#fff;
      transition:transform 0.15s,border-color 0.15s,box-shadow 0.15s;
      display:flex;
      flex-direction:column;
      gap:10px;
      position:relative;
      overflow:hidden;
    }
    .game-card::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,77,255,0.06),transparent);
      pointer-events:none;
    }
    .game-card:hover{
      transform:translateY(-4px) scale(1.02);
      border-color:#ff4dff;
      box-shadow:0 0 24px #ff00ff66;
    }
    .game-card .icon{font-size:2.4rem;line-height:1;}
    .game-card h2{font-size:1rem;color:#ff4dff;letter-spacing:1px;}
    .game-card p{font-size:0.78rem;color:#bbb;line-height:1.5;}
    .game-card .badge{
      display:inline-block;font-size:0.65rem;
      background:#ff4dff22;color:#ff88ff;
      border:1px solid #ff4dff44;border-radius:20px;
      padding:2px 10px;margin-top:4px;width:fit-content;
    }
    .add-card{
      border-style:dashed;
      border-color:#7700cc88;
      background:transparent;
      align-items:center;justify-content:center;
      text-align:center;
      color:#7700cc;
      font-size:0.85rem;
      cursor:default;
      min-height:140px;
    }
    .add-card .plus{font-size:2rem;margin-bottom:8px;color:#7700cc;}
    footer{
      text-align:center;padding:30px;
      color:#444;font-size:0.72rem;
      letter-spacing:1px;
      border-top:1px solid #ffffff11;
    }
  </style>
</head>
<body>
  <div class="scanline"></div>
  <header>
    <h1>&#x1F3AE; RUSS'S ARCADE</h1>
    <p>INSERT COIN TO CONTINUE</p>
  </header>

  <div class="games-grid">

    <a class="game-card" href="fun-sucking-gun-2/index.html">
      <div class="icon">&#x1F52B;</div>
      <h2>FUN SUCKING GUN 2</h2>
      <p>Suck the fun out of 12 unsuspecting people before time runs out. They will flee. You will not care.</p>
      <span class="badge">Action &#x2022; 30s</span>
    </a>

    <div class="game-card add-card">
      <div class="plus">+</div>
      <div>MORE GAMES COMING SOON</div>
    </div>

  </div>

  <footer>russmatson.github.io/games &mdash; built with GitHub Pages</footer>
</body>
</html>
