<!DOCTYPE html>
<!-- Battle progression: advances every 1000 points -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revolutionary Chaos: Muskets & Mayhem</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a0a00; color: #fff; font-family: 'Georgia', serif; overflow: hidden; }
#gameCanvas { display: block; margin: 0 auto; border: 2px solid #8B6914; }
#ui { position: absolute; top: 0; left: 0; width: 100%; padding: 8px 16px; background: rgba(0,0,0,0.7); display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
#oneliner { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); font-size: 22px; font-weight: bold; color: #FFD700; text-shadow: 2px 2px 4px #000; text-align: center; pointer-events: none; opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
#trivia { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(20,10,0,0.97); border: 3px solid #8B6914; border-radius: 12px; padding: 30px; max-width: 560px; width: 90%; display: none; z-index: 100; }
#trivia h2 { color: #FFD700; margin-bottom: 16px; font-size: 18px; }
#trivia p { margin-bottom: 18px; font-size: 15px; line-height: 1.5; }
.tBtn { display: block; width: 100%; margin: 8px 0; padding: 10px 16px; background: #3a2000; border: 1px solid #8B6914; color: #fff; font-size: 14px; cursor: pointer; border-radius: 6px; text-align: left; }
.tBtn:hover { background: #6a4000; }
#battleTitle { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); font-size: 28px; font-weight: bold; color: #FFD700; text-shadow: 3px 3px 6px #000; opacity: 0; transition: opacity 1s; pointer-events: none; }
#smallpoxBar { position: absolute; bottom: 40px; right: 16px; font-size: 12px; color: #ff6666; }
#msgBox { position: absolute; bottom: 120px; left: 16px; font-size: 13px; color: #aaffaa; }
</style>
</head>
<body>
<div id="ui">
  <span>&#x2694;&#xFE0F; REVOLUTIONARY CHAOS</span>
  <span>Score: <b id="score">0</b></span>
  <span>&#x2764; <span id="lives">3</span> &nbsp; &#x2621; Plague: <span id="plague">0</span>%</span>
  <span>Battle: <span id="battleName">Bunker Hill</span></span>
</div>
<canvas id="gameCanvas"></canvas>
<div id="oneliner"></div>
<div id="battleTitle"></div>
<div id="smallpoxBar">SMALLPOX: <span id="poxLevel">0</span>% spread</div>
<div id="msgBox"></div>
<div id="trivia">
  <h2>&#x1F4DC; HISTORY CHECK - MCAS STYLE</h2>
  <p id="triviaQ"></p>
  <div id="triviaAnswers"></div>
  <p id="triviaFeedback" style="margin-top:12px;font-weight:bold;color:#FFD700;"></p>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 500;

let score = 0, lives = 3, plagueLevel = 0, gameOver = false, paused = false;
let bullets = [], enemies = [], particles = [], poxClouds = [];
let triviaActive = false, triviaCallback = null;
let frameCount = 0, lastEnemySpawn = 0, lastPoxSpawn = 0;
let currentBattle = 0;
let playerInvincible = 0; // invincibility frames after hit

const battles = [
  { name: 'Battle of Bunker Hill', bg: '#2a1a05', ground: '#4a3010', year: 1775 },
  { name: 'Battle of Trenton', bg: '#0a0a1a', ground: '#4a4a5a', year: 1776 },
  { name: 'Battle of Gettysburg', bg: '#1a0a0a', ground: '#5a3a20', year: 1863 },
  { name: 'Battle of Antietam', bg: '#0a1a0a', ground: '#3a5a20', year: 1862 },
];

const oneLiners = [
  "Looks like he took the SHOT heard round the world!",
  "That's what I call a REVOLUTIONARY exit!",
  "He really FELL for independence!",
  "Another redcoat bites the dust - literally!",
  "I guess he wasn't ready for that DISCHARGE!",
  "History just got a little shorter!",
  "TAXATION without representation... or a pulse!",
  "He won't be crossing the Delaware now!",
  "That's a GRAVE misunderstanding of tactics!",
  "Consider yourself DEMOBILIZED, soldier!",
  "He fought for the Crown - past tense!",
  "Well, that escalated QUICKLY - like the colonies!",
  "Looks like his career just SURRENDERED!",
  "I declare this enemy INDEPENDENT of the living!",
];

const chargeOneLiners = [
  "They're charging! Do NOT fire till you see the whites of their eyes!",
  "BAYONETS! They brought bayonets to a musket fight!",
  "They're coming in HOT - like Valley Forge in January!",
  "RETREAT? I don't know the word! ...HELP!",
  "They crossed the whole battlefield just to ruin your day!",
];

const poxOneLiners = [
  "Smallpox: nature's most patriotic weapon!",
  "Washington would approve of this biological strategy!",
  "They said it was a pox on both your houses - starting with yours!",
  "Inoculation? Never heard of her!",
  "The British sent soldiers. We sent germs. Same energy.",
];

const triviaBank = [
  { q: "What was the main complaint of American colonists that led to the Revolutionary War?", a: ["Taxation without representation", "The king was too far away", "They wanted to trade with France", "They disagreed with British fashion"], correct: 0, bonus: "TRIVIA BONUS: +200 pts! Colonists had no elected reps in British Parliament." },
  { q: "The Battle of Bunker Hill (1775) was significant because:", a: ["The British won but suffered heavy casualties, showing colonists could fight", "The Americans won a decisive victory", "It was the last battle of the Revolution", "George Washington personally led the charge"], correct: 0, bonus: "TRIVIA BONUS: +200 pts! The British won but lost 1,000+ men." },
  { q: "Which document, written mainly by Thomas Jefferson, declared American independence?", a: ["The Articles of Confederation", "The Constitution", "The Declaration of Independence", "The Federalist Papers"], correct: 2, bonus: "TRIVIA BONUS: +200 pts! The Declaration was adopted July 4, 1776." },
  { q: "The Civil War began in April 1861 when Confederate forces attacked which federal fort?", a: ["Fort Knox", "Fort Sumter", "Fort McHenry", "Fort Ticonderoga"], correct: 1, bonus: "TRIVIA BONUS: +200 pts! Fort Sumter, South Carolina - first shots of the Civil War." },
  { q: "President Lincoln issued the Emancipation Proclamation in 1863. What did it do?", a: ["Ended the Civil War", "Freed enslaved people in Confederate states", "Gave women the right to vote", "Created the Union Army"], correct: 1, bonus: "TRIVIA BONUS: +200 pts! It declared slaves in rebel states 'forever free.'" },
  { q: "The Battle of Gettysburg (1863) was a turning point because:", a: ["The Union captured the Confederate capital", "The Confederate Army was forced to retreat and never invaded the North again", "General Lee surrendered", "Abraham Lincoln led troops personally"], correct: 1, bonus: "TRIVIA BONUS: +200 pts! After Gettysburg the Confederacy was on the defensive." },
  { q: "Who was the commanding general of the Continental Army during the Revolutionary War?", a: ["Benjamin Franklin", "John Adams", "George Washington", "Thomas Jefferson"], correct: 2, bonus: "TRIVIA BONUS: +200 pts! Washington commanded from 1775 to 1783." },
  { q: "What year did the Civil War end?", a: ["1861", "1863", "1865", "1870"], correct: 2, bonus: "TRIVIA BONUS: +200 pts! Lee surrendered to Grant at Appomattox Court House, April 9, 1865." },
  { q: "The Gettysburg Address was a speech given by Abraham Lincoln to dedicate a:", a: ["New military base", "Confederate prison", "Soldiers' national cemetery", "Victory parade"], correct: 2, bonus: "TRIVIA BONUS: +200 pts! Lincoln spoke at the dedication of the Soldiers' National Cemetery." },
  { q: "During the Revolution, the colonists were fighting against which country?", a: ["France", "Spain", "Great Britain", "Germany"], correct: 2, bonus: "TRIVIA BONUS: +200 pts! The colonies declared independence from Great Britain." },
];

const player = { x: 380, y: 340, w: 32, h: 48, vx: 0, vy: 0, speed: 3.5, facing: 'right', color: '#3399ff', health: 3 };
const keys = {};
let triviaIdx = 0;
let nextTriviaScore = 500;
let nextBattleScore = 1000;

function rand(a, b) { return Math.random() * (b - a) + a; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function spawnEnemy() {
  const side = Math.random() > 0.3 ? 'right' : 'left';
  const x = side === 'right' ? 820 : -40;
  const types = ['redcoat', 'confederate', 'hessian'];
  const type = pick(types);
  // Some enemies are chargers (fast, run toward player)
  const isCharger = Math.random() < 0.35;
  enemies.push({
    x, y: rand(280, 370), w: 28, h: 50,
    vx: side === 'right' ? -rand(0.6, 1.4) : rand(0.6, 1.4),
    vy: 0,
    hp: isCharger ? 1 : (Math.random() < 0.2 ? 3 : 1),
    type, side,
    isCharger,
    chargeSpeed: rand(1.8, 3.2),
    poxed: false, poxTimer: 0,
    color: type === 'redcoat' ? '#cc2222' : type === 'confederate' ? '#777755' : '#888866',
    hatColor: type === 'redcoat' ? '#990000' : type === 'confederate' ? '#555544' : '#666655',
    dead: false,
  });
}

function spawnPoxCloud() {
  poxClouds.push({
    x: rand(100, 700), y: rand(280, 380),
    r: rand(30, 60), life: 180 + rand(0, 120),
    vx: rand(-0.3, 0.3), vy: rand(-0.1, 0.1),
    alpha: 0.4,
  });
}

function showOneLiner(txt) {
  const el = document.getElementById('oneliner');
  el.textContent = txt;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = '0', 2800);
}

function showMsg(txt) {
  const el = document.getElementById('msgBox');
  el.textContent = txt;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.textContent = '', 3000);
}

function showBattleTitle() {
  const el = document.getElementById('battleTitle');
  const b = battles[currentBattle];
  el.textContent = b.name + ' (' + b.year + ')';
  el.style.opacity = '1';
  document.getElementById('battleName').textContent = b.name;
  setTimeout(() => el.style.opacity = '0', 3000);
}

function fireMusket() {
  const dir = player.facing === 'right' ? 1 : -1;
  const bx = player.x + (dir === 1 ? player.w : 0);
  bullets.push({ x: bx, y: player.y + 14, vx: 10 * dir, vy: 0, w: 12, h: 5, fromPlayer: true });
  // Muzzle flash particles
  for (let i = 0; i < 6; i++) {
    particles.push({ x: bx, y: player.y + 16, vx: dir * rand(2, 5) + rand(-1,1), vy: rand(-2, 2), life: 10, color: '#FFD700', size: rand(2,5) });
  }
}

function triggerTrivia(callback) {
  if (triviaActive) return;
  triviaActive = true;
  paused = true;
  triviaCallback = callback;
  const q = triviaBank[triviaIdx % triviaBank.length];
  triviaIdx++;
  document.getElementById('triviaQ').textContent = q.q;
  document.getElementById('triviaFeedback').textContent = '';
  const answersEl = document.getElementById('triviaAnswers');
  answersEl.innerHTML = '';
  q.a.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'tBtn';
    btn.textContent = (i + 1) + '. ' + ans;
    btn.onclick = () => {
      if (i === q.correct) {
        score += 200;
        document.getElementById('score').textContent = score;
        document.getElementById('triviaFeedback').style.color = '#44ff44';
        document.getElementById('triviaFeedback').textContent = q.bonus;
        plagueLevel = Math.min(100, plagueLevel + 15);
        document.getElementById('poxLevel').textContent = plagueLevel;
        document.getElementById('plague').textContent = plagueLevel;
      } else {
        document.getElementById('triviaFeedback').style.color = '#ff4444';
        document.getElementById('triviaFeedback').textContent = 'WRONG! The correct answer was: ' + q.a[q.correct];
      }
      setTimeout(() => {
        document.getElementById('trivia').style.display = 'none';
        triviaActive = false;
        paused = false;
        if (triviaCallback) triviaCallback();
      }, 2000);
    };
    answersEl.appendChild(btn);
  });
  document.getElementById('trivia').style.display = 'block';
}

function killEnemy(enemy, idx) {
  enemy.dead = true;
  score += enemy.isCharger ? 150 : 100;
  document.getElementById('score').textContent = score;
  // Explosion particles
  for (let i = 0; i < 18; i++) {
    particles.push({
      x: enemy.x + enemy.w/2, y: enemy.y + enemy.h/2,
      vx: rand(-4, 4), vy: rand(-5, 1),
      life: rand(20, 40), color: pick(['#ff4444','#ff8800','#ffcc00','#cc2200']),
      size: rand(3, 8)
    });
  }
  showOneLiner(enemy.poxed ? pick(poxOneLiners) : pick(oneLiners));
  if (score >= nextTriviaScore) {
    nextTriviaScore += 500;
    triggerTrivia(() => {});
  }
  if (score >= nextBattleScore) {
    nextBattleScore += 1000;
    currentBattle = (currentBattle + 1) % battles.length;
    showBattleTitle();
  }
}

function hitPlayer() {
  if (playerInvincible > 0) return;
  lives--;
  playerInvincible = 90; // 1.5 seconds invincibility
  document.getElementById('lives').textContent = lives;
  showOneLiner(pick(chargeOneLiners));
  // Flash particles around player
  for (let i = 0; i < 20; i++) {
    particles.push({
      x: player.x + player.w/2, y: player.y + player.h/2,
      vx: rand(-5, 5), vy: rand(-5, 2),
      life: rand(20, 45), color: pick(['#ff2222','#ff8800','#ffff00']),
      size: rand(4, 10)
    });
  }
  if (lives <= 0) { gameOver = true; }
}

function updateBullets() {
  bullets = bullets.filter(b => b.x > -50 && b.x < 860 && b.y > 0 && b.y < 520);
  for (const b of bullets) {
    b.x += b.vx;
    b.y += b.vy;
  }
}

function updateEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.dead) { enemies.splice(i, 1); continue; }

    // Chargers home toward player
    if (e.isCharger) {
      const dx = player.x + player.w/2 - (e.x + e.w/2);
      const dy = player.y + player.h/2 - (e.y + e.h/2);
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 0) {
        e.x += (dx / dist) * e.chargeSpeed;
        e.y += (dy / dist) * e.chargeSpeed * 0.3;
      }
    } else {
      e.x += e.vx;
    }

    // Pox cloud interaction
    if (!e.poxed) {
      for (const pc of poxClouds) {
        const dx = e.x + e.w/2 - pc.x;
        const dy = e.y + e.h/2 - pc.y;
        if (Math.sqrt(dx*dx + dy*dy) < pc.r + 10) {
          e.poxed = true;
          e.poxTimer = 180;
          break;
        }
      }
    }
    if (e.poxed) {
      e.poxTimer--;
      if (e.poxTimer <= 0) killEnemy(e, i);
    }

    // Bullet collision
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (b.fromPlayer && b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
        bullets.splice(j, 1);
        e.hp--;
        // Hit flash
        for (let k = 0; k < 5; k++) {
          particles.push({ x: e.x + e.w/2, y: e.y + e.h/3, vx: rand(-2,2), vy: rand(-3,0), life: 15, color: '#ff6666', size: rand(2,5) });
        }
        if (e.hp <= 0) killEnemy(e, i);
        break;
      }
    }

    // PLAYER COLLISION - enemies touch player = lose a life
    if (!e.dead) {
      const px = player.x, py = player.y, pw = player.w, ph = player.h;
      if (e.x < px + pw && e.x + e.w > px && e.y < py + ph && e.y + e.h > py) {
        hitPlayer();
        // Push enemy back
        const pushDir = e.x < px ? -1 : 1;
        e.x += pushDir * 40;
        if (!e.isCharger) killEnemy(e, i); // non-chargers die on contact too (bayonet duel)
      }
    }

    // Off-screen removal (non-chargers)
    if (!e.isCharger && (e.x < -80 || e.x > 860)) {
      enemies.splice(i, 1);
    }
  }
}

function updatePoxClouds() {
  for (let i = poxClouds.length - 1; i >= 0; i--) {
    const pc = poxClouds[i];
    pc.x += pc.vx; pc.y += pc.vy;
    pc.life--;
    if (pc.life <= 0) poxClouds.splice(i, 1);
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updatePlayer() {
  if (playerInvincible > 0) playerInvincible--;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) { player.vx = -player.speed; player.facing = 'left'; }
  else if (keys['ArrowRight'] || keys['d'] || keys['D']) { player.vx = player.speed; player.facing = 'right'; }
  else player.vx *= 0.8;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) player.vy = -player.speed;
  else if (keys['ArrowDown'] || keys['s'] || keys['S']) player.vy = player.speed;
  else player.vy *= 0.8;
  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x + player.vx));
  player.y = Math.max(260, Math.min(canvas.height - player.h - 60, player.y + player.vy));
}

function update() {
  if (gameOver || paused || triviaActive) return;
  frameCount++;
  updatePlayer();
  updateBullets();
  updateEnemies();
  updatePoxClouds();
  updateParticles();

  const spawnRate = Math.max(40, 90 - Math.floor(score / 300));
  if (frameCount - lastEnemySpawn > spawnRate) {
    spawnEnemy();
    lastEnemySpawn = frameCount;
    // Spawn extra charger on high score
    if (score > 1000 && Math.random() < 0.3) spawnEnemy();
  }
  if (plagueLevel > 20 && frameCount - lastPoxSpawn > 200) {
    spawnPoxCloud();
    lastPoxSpawn = frameCount;
  }
}

function drawBackground() {
  const b = battles[currentBattle];
  ctx.fillStyle = b.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Distant hills
  ctx.fillStyle = '#3a2500';
  ctx.beginPath(); ctx.ellipse(200, 280, 200, 60, 0, 0, Math.PI); ctx.fill();
  ctx.beginPath(); ctx.ellipse(600, 290, 220, 50, 0, 0, Math.PI); ctx.fill();
  // Ground
  ctx.fillStyle = b.ground;
  ctx.fillRect(0, 400, canvas.width, 100);
  // Fence posts for ambiance
  ctx.fillStyle = '#5a3a10';
  for (let fx = 50; fx < 760; fx += 80) {
    ctx.fillRect(fx, 370, 8, 35);
    ctx.fillRect(fx - 30, 382, 65, 5);
  }
}

function drawPoxClouds() {
  for (const pc of poxClouds) {
    const alpha = (pc.life / 300) * 0.5;
    ctx.beginPath();
    ctx.arc(pc.x, pc.y, pc.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(100,200,50,' + Math.min(0.5, alpha) + ')';
    ctx.fill();
    ctx.strokeStyle = 'rgba(150,255,80,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = 'rgba(200,255,100,0.7)';
    ctx.font = '14px Georgia';
    ctx.fillText('☣', pc.x - 8, pc.y + 5);
  }
}

function drawEnemy(e) {
  const flash = e.poxed && Math.floor(frameCount / 5) % 2 === 0;
  const bodyColor = flash ? '#88ff44' : e.color;
  // Body
  ctx.fillStyle = bodyColor;
  ctx.fillRect(e.x + 4, e.y + 20, e.w - 8, e.h - 20);
  // Head
  ctx.fillStyle = '#d4a070';
  ctx.fillRect(e.x + 7, e.y + 2, e.w - 14, 18);
  // Hat
  ctx.fillStyle = e.hatColor;
  ctx.fillRect(e.x + 4, e.y - 4, e.w - 8, 8);
  ctx.fillRect(e.x + 1, e.y - 8, e.w - 2, 6);
  // Musket
  ctx.fillStyle = '#6a4020';
  ctx.fillRect(e.x + (e.side === 'right' ? 0 : e.w - 4), e.y + 18, 4, 28);
  // Charger indicator - red outline
  if (e.isCharger) {
    ctx.strokeStyle = '#ff2200';
    ctx.lineWidth = 2;
    ctx.strokeRect(e.x - 1, e.y - 5, e.w + 2, e.h + 5);
    // Bayonet
    ctx.fillStyle = '#cccccc';
    ctx.fillRect(e.x + (e.side === 'right' ? -3 : e.w - 1), e.y + 8, 3, 12);
  }
  // HP bar for 3hp enemies
  if (e.hp > 1) {
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(e.x, e.y - 12, e.w, 5);
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(e.x, e.y - 12, e.w * (e.hp / 3), 5);
  }
}

function drawPlayer() {
  // Invincibility flash
  if (playerInvincible > 0 && Math.floor(playerInvincible / 6) % 2 === 0) return;
  const p = player;
  // Body - blue colonial coat
  ctx.fillStyle = '#2255aa';
  ctx.fillRect(p.x + 4, p.y + 20, p.w - 8, p.h - 22);
  // Head
  ctx.fillStyle = '#d4a070';
  ctx.fillRect(p.x + 8, p.y + 2, p.w - 16, 18);
  // Tricorn hat
  ctx.fillStyle = '#222244';
  ctx.fillRect(p.x + 4, p.y - 6, p.w - 8, 10);
  ctx.fillRect(p.x - 2, p.y - 10, p.w + 4, 6);
  // Musket
  ctx.fillStyle = '#6a3a10';
  const mDir = p.facing === 'right' ? 1 : -1;
  ctx.fillRect(p.facing === 'right' ? p.x + p.w - 4 : p.x - 16, p.y + 16, 20, 4);
  // Barrel tip
  ctx.fillStyle = '#888';
  ctx.fillRect(p.facing === 'right' ? p.x + p.w + 14 : p.x - 18, p.y + 17, 4, 2);
  // Legs
  ctx.fillStyle = '#ccccaa';
  ctx.fillRect(p.x + 5, p.y + p.h - 18, 9, 18);
  ctx.fillRect(p.x + p.w - 14, p.y + p.h - 18, 9, 18);
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / 40);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // Mini health hearts
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < lives ? '#ff2222' : '#444';
    ctx.font = '16px Georgia';
    ctx.fillText('♥', 760 + i * 16, canvas.height - 10);
  }
}

function draw() {
  drawBackground();
  drawPoxClouds();
  for (const e of enemies) drawEnemy(e);
  for (const b of bullets) {
    ctx.fillStyle = '#ffee44';
    ctx.fillRect(b.x, b.y, b.w, b.h);
  }
  drawParticles();
  drawPlayer();
  drawHUD();
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, 800, 500);
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 48px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', 400, 220);
    ctx.font = '24px Georgia';
    ctx.fillStyle = '#fff';
    ctx.fillText('Final Score: ' + score, 400, 270);
    ctx.font = '18px Georgia';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Press R to play again', 400, 310);
    ctx.textAlign = 'left';
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === ' ' || e.key === 'Space') && !paused && !gameOver) { e.preventDefault(); fireMusket(); }
  if (e.key === 'p' || e.key === 'P') { paused = !paused; if (!triviaActive) paused = !paused; }
  if ((e.key === 'r' || e.key === 'R') && gameOver) {
    score = 0; lives = 3; plagueLevel = 0; gameOver = false; paused = false;
    bullets = []; enemies = []; particles = []; poxClouds = [];
    player.x = 380; player.y = 340; playerInvincible = 0;
    nextTriviaScore = 500; nextBattleScore = 1000; frameCount = 0; lastEnemySpawn = 0; lastPoxSpawn = 0;
    document.getElementById('score').textContent = 0;
    document.getElementById('lives').textContent = 3;
    document.getElementById('plague').textContent = 0;
    document.getElementById('poxLevel').textContent = 0;
    showBattleTitle();
  }
  if (plagueLevel >= 50 && (e.key === 'q' || e.key === 'Q')) spawnPoxCloud();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

showBattleTitle();
setTimeout(() => triggerTrivia(() => {}), 2000);
showMsg('WASD/Arrows to move | SPACE to fire | Q to deploy smallpox (when plague>50%)');
loop();
</script>
</body>
</html>
