<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATE CAPITAL CHAOS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0033;font-family:'Press Start 2P',monospace,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 20% 50%,#3d0066 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,#001a4d 0%,transparent 50%)}
h1{color:#ff00ff;font-size:1.4em;text-align:center;margin:16px 0 4px;text-shadow:3px 3px 0 #ff0099,6px 6px 0 #9900ff;animation:tb 1s infinite alternate}
@keyframes tb{from{transform:translateY(0)}to{transform:translateY(-6px)}}
#sb{color:#ffff00;font-size:.55em;margin-bottom:8px;text-shadow:2px 2px 0 #ff6600;letter-spacing:2px}
#gc{display:flex;flex-direction:column;align-items:center;width:100%;max-width:700px;padding:0 10px}
#cw{position:relative;width:340px;height:260px;margin:6px 0}
canvas{border-radius:16px;border:4px solid #ff00ff;box-shadow:0 0 30px #ff00ff88,0 0 60px #9900ff44}
#qb{background:linear-gradient(135deg,#0d003a,#1a0066);border:3px solid #00ffff;border-radius:12px;padding:14px 20px;margin:8px 0;width:100%;text-align:center;color:#00ffff;font-size:.7em;line-height:1.7;box-shadow:0 0 20px #00ffff44}
#qb span{color:#ffff00;font-size:1.1em}
#ans{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin:8px 0}
.ab{background:linear-gradient(135deg,#1a0066,#33009a);color:#fff;border:2px solid #9900ff;border-radius:10px;padding:12px 8px;font-family:'Press Start 2P',monospace;font-size:.55em;cursor:pointer;transition:all .1s;text-shadow:1px 1px 0 #000;box-shadow:0 4px 0 #440099;line-height:1.5}
.ab:hover{background:linear-gradient(135deg,#330099,#6600cc);transform:translateY(-2px);box-shadow:0 6px 0 #440099}
.ab:active{transform:translateY(2px);box-shadow:0 2px 0 #440099}
.ab.ok{background:linear-gradient(135deg,#004400,#00aa00)!important;border-color:#00ff00!important}
.ab.no{background:linear-gradient(135deg,#440000,#aa0000)!important;border-color:#ff0000!important}
#sc{color:#ff9900;font-size:.6em;margin:6px;text-shadow:2px 2px 0 #cc6600}
#ol{color:#ff3399;font-size:.55em;text-align:center;min-height:36px;padding:8px 4px;line-height:1.7;text-shadow:1px 1px 0 #000;animation:fi .3s ease;max-width:600px}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
#ov{position:fixed;top:0;left:0;right:0;bottom:0;background:#000c;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:999}
#ov h2{color:#ff00ff;font-size:1.4em;text-align:center;text-shadow:3px 3px 0 #9900ff;margin-bottom:20px}
#ov p{color:#ffff00;font-size:.7em;margin:8px}
#rb{margin-top:20px;background:linear-gradient(135deg,#6600cc,#cc00cc);color:#fff;border:3px solid #ff00ff;border-radius:12px;padding:14px 28px;font-family:'Press Start 2P',monospace;font-size:.7em;cursor:pointer;box-shadow:0 6px 0 #440066;transition:all .1s}
#rb:hover{transform:translateY(-3px)}
.st{position:absolute;pointer-events:none;font-size:1.5em;animation:sf .8s ease-out forwards}
@keyframes sf{from{opacity:1;transform:translateY(0) scale(1) rotate(0)}to{opacity:0;transform:translateY(-80px) scale(2) rotate(360deg)}}
</style>
</head>
<body>
<h1>&#127758; STATE CAPITAL CHAOS &#127758;</h1>
<div id="sb">STREAK: <span id="sk">0</span> &#128293;</div>
<div id="gc">
<div id="cw"><canvas id="cv" width="340" height="260"></canvas></div>
<div id="sc">SCORE: <span id="pts">0</span> &nbsp;|&nbsp; LIVES: <span id="lv">&#10084;&#65039;&#10084;&#65039;&#10084;&#65039;</span></div>
<div id="qb">What is the capital of <span id="sn">???</span>?</div>
<div id="ans"></div>
<div id="ol"></div>
</div>
<div id="ov"><h2 id="ot">GAME OVER</h2><p id="om"></p><button id="rb" onclick="restart()">PLAY AGAIN</button></div>
<script>
const ST=[["Alabama","Montgomery"],["Alaska","Juneau"],["Arizona","Phoenix"],["Arkansas","Little Rock"],["California","Sacramento"],["Colorado","Denver"],["Connecticut","Hartford"],["Delaware","Dover"],["Florida","Tallahassee"],["Georgia","Atlanta"],["Hawaii","Honolulu"],["Idaho","Boise"],["Illinois","Springfield"],["Indiana","Indianapolis"],["Iowa","Des Moines"],["Kansas","Topeka"],["Kentucky","Frankfort"],["Louisiana","Baton Rouge"],["Maine","Augusta"],["Maryland","Annapolis"],["Massachusetts","Boston"],["Michigan","Lansing"],["Minnesota","Saint Paul"],["Mississippi","Jackson"],["Missouri","Jefferson City"],["Montana","Helena"],["Nebraska","Lincoln"],["Nevada","Carson City"],["New Hampshire","Concord"],["New Jersey","Trenton"],["New Mexico","Santa Fe"],["New York","Albany"],["North Carolina","Raleigh"],["North Dakota","Bismarck"],["Ohio","Columbus"],["Oklahoma","Oklahoma City"],["Oregon","Salem"],["Pennsylvania","Harrisburg"],["Rhode Island","Providence"],["South Carolina","Columbia"],["South Dakota","Pierre"],["Tennessee","Nashville"],["Texas","Austin"],["Utah","Salt Lake City"],["Vermont","Montpelier"],["Virginia","Richmond"],["Washington","Olympia"],["West Virginia","Charleston"],["Wisconsin","Madison"],["Wyoming","Cheyenne"]];
const WL=["MY HEAD... because of YOU, you geographical disaster!!","I blame your PARENTS for not teaching you geography.","You've DOOMED us all. I hope you're happy.","My neck... my achin' neck... THANKS TO YOU.","I was SOMEONE before you came along. RIP me.","Even a PIGEON knows more capitals than you.","You absolute clown. I died for NOTHING.","Did you just... GUESS?! I can feel it. I can FEEL the guess.","Tell my family... you're not to be trusted with geography.","Springfield is not EVERYWHERE. Learn something!!","I'm HAUNTING you forever. Hope you like capitals now.","My therapist warned me about players like you.","You picked THAT one?! Bold. Wrong. Catastrophic.","Somewhere a geography teacher is crying. That's on YOU.","I had DREAMS. Now I have none. BECAUSE OF YOU."];
const PM=["PURRRR... you actually did it. The cat is pleased.","3 IN A ROW!! THE CAT ASCENDS!!","CAT HAPPINESS ACHIEVED. You redeemed yourself.","The cat forgives all previous sins. KEEP GOING.","PURRFECT STREAK! The cat vibrates with joy!!"];
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let score=0,lives=3,streak=0,cS,cC,done=false,af=null,aS='idle',aT=0,dP=0,dX=170,dY=100,dVX=0,dVY=0,cP=0,pP=0,hts=[];
const rnd=a=>a[Math.floor(Math.random()*a.length)],sh=a=>[...a].sort(()=>Math.random()-0.5);
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function drawBG(c1,c2){c1=c1||'#0d0030';c2=c2||'#1a0055';const g=ctx.createLinearGradient(0,0,0,260);g.addColorStop(0,c1);g.addColorStop(1,c2);ctx.fillStyle=g;ctx.fillRect(0,0,340,260);ctx.fillStyle='#ffffff44';for(let i=0;i<30;i++)ctx.fillRect(20+i*11,15+(i*37)%50,i%2+1,i%2+1);}
function drawCat(x,y,sc,wb,headOn,ex,col){sc=sc||1;wb=wb||0;ex=ex||'n';col=col||'#ff9900';ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);ctx.fillStyle=col;rr(-28,-20,56,50,14);ctx.fill();ctx.fillStyle='#ffddaa';rr(-16,2,32,28,10);ctx.fill();ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(-22,34,10,7,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(22,34,10,7,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=8;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(26,20);ctx.quadraticCurveTo(55,10,50,-10);ctx.stroke();
if(headOn){ctx.save();ctx.translate(wb,0);ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(0,-42,28,26,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(-20,-60);ctx.lineTo(-30,-78);ctx.lineTo(-8,-62);ctx.fill();ctx.beginPath();ctx.moveTo(20,-60);ctx.lineTo(30,-78);ctx.lineTo(8,-62);ctx.fill();ctx.fillStyle='#ff6688';ctx.beginPath();ctx.moveTo(-20,-63);ctx.lineTo(-26,-74);ctx.lineTo(-11,-64);ctx.fill();ctx.beginPath();ctx.moveTo(20,-63);ctx.lineTo(26,-74);ctx.lineTo(11,-64);ctx.fill();
if(ex==='h'){ctx.strokeStyle='#222';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(-11,-44,6,Math.PI,0,false);ctx.stroke();ctx.beginPath();ctx.arc(11,-44,6,Math.PI,0,false);ctx.stroke();ctx.fillStyle='#ff669966';ctx.beginPath();ctx.ellipse(-17,-40,8,5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(17,-40,8,5,0,0,Math.PI*2);ctx.fill();}else{ctx.fillStyle='#1a0033';ctx.beginPath();ctx.ellipse(-11,-44,5,6,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(11,-44,5,6,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffffff88';ctx.beginPath();ctx.ellipse(-9,-46,2,2,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(13,-46,2,2,0,0,Math.PI*2);ctx.fill();}
ctx.fillStyle='#ff3366';ctx.beginPath();ctx.moveTo(0,-38);ctx.lineTo(-4,-35);ctx.lineTo(4,-35);ctx.closePath();ctx.fill();ctx.strokeStyle='#ffffff88';ctx.lineWidth=1.5;[-1,1].forEach(d=>{ctx.beginPath();ctx.moveTo(d*5,-36);ctx.lineTo(d*28,-32);ctx.stroke();ctx.beginPath();ctx.moveTo(d*5,-34);ctx.lineTo(d*28,-37);ctx.stroke();});
if(ex==='h'){ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-32,6,0.1,Math.PI-0.1);ctx.stroke();}else{ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-6,-32);ctx.lineTo(0,-30);ctx.lineTo(6,-32);ctx.stroke();}ctx.restore();}ctx.restore();}
function drawHead(x,y,ang){ctx.save();ctx.translate(x,y);ctx.rotate(ang||0);ctx.fillStyle='#ff9900';ctx.beginPath();ctx.ellipse(0,0,28,26,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff9900';ctx.beginPath();ctx.moveTo(-20,-18);ctx.lineTo(-30,-36);ctx.lineTo(-8,-20);ctx.fill();ctx.beginPath();ctx.moveTo(20,-18);ctx.lineTo(30,-36);ctx.lineTo(8,-20);ctx.fill();ctx.fillStyle='#ff6688';ctx.beginPath();ctx.moveTo(-20,-21);ctx.lineTo(-26,-32);ctx.lineTo(-11,-22);ctx.fill();ctx.beginPath();ctx.moveTo(20,-21);ctx.lineTo(26,-32);ctx.lineTo(11,-22);ctx.fill();ctx.strokeStyle='#ff0000';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(-15,-6);ctx.lineTo(-7,2);ctx.stroke();ctx.beginPath();ctx.moveTo(-7,-6);ctx.lineTo(-15,2);ctx.stroke();ctx.beginPath();ctx.moveTo(7,-6);ctx.lineTo(15,2);ctx.stroke();ctx.beginPath();ctx.moveTo(15,-6);ctx.lineTo(7,2);ctx.stroke();ctx.fillStyle='#ff3366';ctx.beginPath();ctx.moveTo(0,6);ctx.lineTo(-4,9);ctx.lineTo(4,9);ctx.closePath();ctx.fill();ctx.restore();}
function blood(x,y,a){ctx.fillStyle='#cc0000';for(let i=0;i<Math.floor(8*a);i++){const r2=Math.random()*Math.PI*2,r3=10+Math.random()*40;ctx.beginPath();ctx.ellipse(x+Math.cos(r2)*r3,y+Math.sin(r2)*r3,3+Math.random()*8,2+Math.random()*5,r2,0,Math.PI*2);ctx.fill();}}
function handDraw(x,y,ph){ctx.save();ctx.translate(x,y);ctx.fillStyle='#ffccaa';ctx.beginPath();ctx.ellipse(0,0,18,12,Math.sin(ph)*0.3,0,Math.PI*2);ctx.fill();[-0.5,-0.15,0.15,0.45].forEach(a=>{ctx.save();ctx.rotate(a-0.3);ctx.fillStyle='#ffccaa';ctx.beginPath();ctx.ellipse(0,-16,5,10,0,0,Math.PI*2);ctx.fill();ctx.restore();});ctx.restore();}
function sparks(cx,cy,t){const cs=['#ffff00','#ff00ff','#00ffff','#ff9900','#00ff00'];for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2+t*2,r=40+Math.sin(t*5+i)*15;ctx.fillStyle=cs[i%5];ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,5+Math.sin(t*7+i)*3,0,Math.PI*2);ctx.fill();ctx.fillStyle=cs[(i+2)%5];ctx.beginPath();ctx.arc(cx+Math.cos(a+.2)*(r+20),cy+Math.sin(a+.2)*(r+20),3,0,Math.PI*2);ctx.fill();}}
function rbw(t){['#ff0000','#ff9900','#ffff00','#00ff00','#0099ff','#9900ff'].forEach((c,i)=>{ctx.strokeStyle=c;ctx.lineWidth=8;ctx.beginPath();ctx.arc(170,260+t*30,80+i*15,Math.PI,0,false);ctx.stroke();});}
function spawnStars(){const w=document.getElementById('cw');for(let i=0;i<8;i++){const s=document.createElement('div');s.className='st';s.textContent=['*','~','o','+'][~~(Math.random()*4)];s.style.cssText='left:'+(30+~~(Math.random()*280))+'px;top:'+(20+~~(Math.random()*200))+'px;animation-delay:'+(Math.random()*.4)+'s';w.appendChild(s);setTimeout(()=>s.remove(),1200);}}
function goCorrect(){cP=0;aS='correct';if(af)cancelAnimationFrame(af);(function run(){cP++;const t=cP/60;drawBG('#001a00','#003300');rbw(t);sparks(170,130,t);drawCat(170,160,1+Math.sin(cP*.3)*.08,Math.sin(cP*.4)*8,true,'h');ctx.fillStyle='hsl('+(cP*20)+',100%,60%)';ctx.font='bold 22px sans-serif';ctx.textAlign='center';ctx.fillText('CORRECT!!',170,30);ctx.fillStyle='#ffff00';ctx.font='15px sans-serif';ctx.fillText('+10 pts',170,55);if(cP<130)af=requestAnimationFrame(run);else idle();})();}
function goDecap(){dP=0;dX=170;dY=100;dVX=(Math.random()-.5)*14;dVY=-10;aS='decap';if(af)cancelAnimationFrame(af);(function run(){dP++;drawBG('#1a0000','#330000');blood(170,105,Math.min(dP/10,2.5));drawCat(170,160,1,0,false);ctx.fillStyle='#cc0000';ctx.beginPath();ctx.ellipse(170,107,14,10,0,0,Math.PI*2);ctx.fill();dX+=dVX;dY+=dVY;dVY+=.5;if(dY>280)dVY=-Math.abs(dVY)*.45;drawHead(dX,dY,dP*.12);if(dP<45){ctx.fillStyle='#ff2200';ctx.font='bold 20px sans-serif';ctx.textAlign='center';ctx.fillText('WRONG!!',170,30);ctx.fillStyle='#ff9900';ctx.font='13px sans-serif';ctx.fillText('Answer: '+cC,170,52);}if(dP<145)af=requestAnimationFrame(run);else idle();})();}
function goPet(){pP=0;hts=[];for(let i=0;i<12;i++)hts.push({x:100+Math.random()*140,y:80+Math.random()*60,vy:-1-Math.random()*2,vx:(Math.random()-.5)*2,a:1,sz:16+Math.random()*16});aS='pet';if(af)cancelAnimationFrame(af);(function run(){pP++;drawBG('#000020','#001040');rbw(pP/120);sparks(170,140,pP/60);drawCat(170,165,1+Math.sin(pP*.2)*.06,Math.sin(pP*.25)*4,true,'h');handDraw(170,50+Math.sin(pP*.15)*18,pP*.1);hts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.a-=.012;if(p.a>0){ctx.save();ctx.fillStyle='rgba(255,100,150,'+p.a+')';ctx.font=p.sz+'px serif';ctx.textAlign='left';ctx.fillText('heart',p.x,p.y);ctx.restore();}});ctx.save();ctx.translate(170,22);ctx.rotate(Math.sin(pP*.3)*.1);ctx.fillStyle='hsl('+(pP*10)+',100%,65%)';ctx.font='bold 15px sans-serif';ctx.textAlign='center';ctx.fillText('3 IN A ROW!!',0,0);ctx.restore();ctx.fillStyle='#ffff99';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText('THE CAT IS HAPPY!!',170,246);if(pP<155)af=requestAnimationFrame(run);else idle();})();}
function idle(){aS='idle';aT=0;if(af)cancelAnimationFrame(af);(function run(){if(aS!=='idle')return;aT++;const w=Math.sin(aT*.05)*3,b=Math.sin(aT*.03)*2;drawBG();ctx.save();ctx.translate(0,b);drawCat(170,155,1,w,true,'n');ctx.restore();ctx.fillStyle='#ffffff66';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('Choose the capital!',170,240);af=requestAnimationFrame(run);})();}
function upLives(){document.getElementById('lv').textContent=lives>0?'❤️'.repeat(lives):'💀';}
function newQ(){done=false;document.getElementById('ol').textContent='';document.querySelectorAll('.ab').forEach(b=>b.classList.remove('ok','no'));const p=rnd(ST);cS=p[0];cC=p[1];document.getElementById('sn').textContent=cS;const ws=sh(ST.filter(s=>s[1]!==cC)).slice(0,3).map(s=>s[1]);const d=document.getElementById('ans');d.innerHTML='';sh([cC,...ws]).forEach(o=>{const b=document.createElement('button');b.className='ab';b.textContent=o;b.onclick=()=>check(o,b);d.appendChild(b);});aS='idle';if(af)cancelAnimationFrame(af);idle();}
function check(ans,btn){if(done)return;done=true;if(ans===cC){btn.classList.add('ok');score+=10;streak++;document.getElementById('pts').textContent=score;document.getElementById('sk').textContent=streak;if(streak%3===0){document.getElementById('ol').textContent=rnd(PM);goPet();}else{goCorrect();spawnStars();}}else{btn.classList.add('no');document.querySelectorAll('.ab').forEach(b=>{if(b.textContent===cC)b.classList.add('ok');});streak=0;document.getElementById('sk').textContent=0;lives--;upLives();document.getElementById('ol').textContent=rnd(WL);goDecap();if(lives<=0){setTimeout(over,2200);return;}}setTimeout(newQ,2200);}
function over(){if(af)cancelAnimationFrame(af);const o=document.getElementById('ov');o.style.display='flex';document.getElementById('ot').textContent=lives<=0?'GAME OVER':'YOU WIN!!';document.getElementById('om').textContent='Final Score: '+score;}
function restart(){score=0;lives=3;streak=0;done=false;document.getElementById('pts').textContent=0;document.getElementById('sk').textContent=0;upLives();document.getElementById('ov').style.display='none';document.getElementById('ol').textContent='';newQ();}
newQ();
</script>
</body>
</html>
